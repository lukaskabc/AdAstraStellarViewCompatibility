modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/lukaskabc/AdAstraStellarViewCompatibility/issues"


[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/lukaskabc/AdAstraStellarViewCompatibility"

# A file name (in the root of the mod JAR) containing a logo for display
#logoFile="examplemod.png" #optional

authors="lukaskabc"
description='''
Replaces sky in ad Ad Astra dimensions with StellarView sky
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="stellarview"
    type="required"
    versionRange="[${stellarview_version},)"
    ordering="AFTER"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="ad_astra"
    type="required"
    versionRange="[${adastra_version},)"
    ordering="AFTER"
    side="CLIENT"

